name: Login WhatsApp (fazer uma vez)

on:
  workflow_dispatch:   # disparo manual apenas

jobs:
  login:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    env:
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Instalar Google Chrome estável
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Instalar dependências
        run: pip install selenium chromedriver-autoinstaller "qrcode[pil]"

      - name: Configurar Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fazer login e salvar sessão
        run: python -u login.py

      - name: Commitar sessão no repositório
        run: |
          if [ -d chrome_session ]; then
            git add chrome_session/
            git diff --staged --quiet || git commit -m "chore: salvar sessão WhatsApp Linux [skip ci]"
            git push
            echo "[✓] Sessão salva no repositório!"
          else
            echo "[ERRO] Pasta chrome_session não foi criada."
            exit 1
          fi
