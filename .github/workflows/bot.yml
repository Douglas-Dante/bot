name: WhatsApp Bot

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Instalar Google Chrome estável
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Instalar dependências e rodar o bot
        run: |
          pip install selenium chromedriver-autoinstaller
          google-chrome --version
          python -c "import chromedriver_autoinstaller; path = chromedriver_autoinstaller.install(); print('ChromeDriver em:', path)"
          python novo.py
