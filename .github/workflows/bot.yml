name: WhatsApp Bot

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Instalar Google Chrome estável
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Instalar dependências
        run: pip install selenium chromedriver-autoinstaller "qrcode[pil]"

      - name: Rodar o bot
        run: python -u novo.py
